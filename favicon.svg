<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Cyan → Green top-to-bottom gradient matching portfolio theme -->
    <linearGradient id="theme-grad" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00ff9f"/>
    </linearGradient>

    <!-- Subtle glow on stroke -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- All icon strokes share the same gradient and glow -->
  <g fill="none" stroke="url(#theme-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

    <!-- Antenna stem -->
    <line x1="32" y1="21" x2="32" y2="13"/>

    <!-- Antenna ball -->
    <circle cx="32" cy="9.5" r="3.5"/>

    <!-- Head / main face box -->
    <rect x="11" y="21" width="42" height="32" rx="5"/>

    <!-- Left ear -->
    <rect x="3.5" y="29" width="8.5" height="14" rx="2"/>

    <!-- Right ear -->
    <rect x="52" y="29" width="8.5" height="14" rx="2"/>

    <!-- Left eye -->
    <circle cx="23.5" cy="39" r="5"/>

    <!-- Right eye -->
    <circle cx="40.5" cy="39" r="5"/>

  </g>
</svg>
